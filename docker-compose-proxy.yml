# LiteLLM proxy (LLM gateway) + the chat app (FastAPI backend + Nuxt frontend) for
# ai-engineering-learn.
#
# Separate from the backing-infra stack (docker-compose-tool.yml) so the gateway and
# app can be restarted / retuned without bouncing Postgres, Temporal, Neo4j, or Qdrant.
#
#   cp .env.proxy.example .env.proxy                              # then fill in real keys
#   docker compose -f docker-compose-proxy.yml up -d --build      # builds chat + chat-ui images
#   open http://localhost:3000                                    # the chat UI
#   docker compose -f docker-compose-proxy.yml restart litellm    # after editing config.yaml (volume-mounted, re-read on boot)
#   docker compose -f docker-compose-proxy.yml up -d --force-recreate  # after editing .env.proxy (env is read only at container creation)
#   docker compose -f docker-compose-proxy.yml up -d --build chat chat-ui  # rebuild only the app after code changes
#   docker compose -f docker-compose-proxy.yml down
#
# `.env.proxy` must exist before `up` — litellm and chat declare it as their env source.
# Wiring: chat-ui -> chat -> litellm, all over the compose network by service name.

services:
  litellm:
    # Pinned stable tag (repo convention: everything is pinned). Bump deliberately.
    # Tags: https://github.com/BerriAI/litellm/pkgs/container/litellm
    image: ghcr.io/berriai/litellm:main-v1.81.9-stable
    container_name: aie-litellm
    env_file:
      - .env.proxy
    volumes:
      - ./services/proxy/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"   # free — tool stack uses 5432/7233/8080/7474/7687/6333/6334
    healthcheck:
      # python-based: curl is not guaranteed to ship in the image.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  chat:
    # FastAPI chat service. Routes every LLM call through the litellm gateway.
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    container_name: aie-chat
    env_file:
      - .env.proxy   # LITELLM_MASTER_KEY + LANGFUSE_* keys
    environment:
      # Reach the gateway over the compose network, not the host's localhost.
      LITELLM_PROXY_URL: http://litellm:4000
    # Internal-only by design: the frontend reaches it at http://chat:8000 over the
    # compose network. Not published to the host (host :8000 is often already taken).
    # Uncomment to curl it directly during debugging.
    # ports:
    #   - "8000:8000"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      # python ships in the image (uv base); curl does not.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chat-ui:
    # Nuxt frontend. Its Nitro server proxies /api/chat -> the chat backend, so the
    # browser only ever talks to this origin (no CORS, no direct backend exposure).
    build:
      context: ./services/chat-ui
      dockerfile: Dockerfile
    container_name: aie-chat-ui
    environment:
      # Overrides runtimeConfig.chatApiUrl at startup -> the backend over the network.
      NUXT_CHAT_API_URL: http://chat:8000
    ports:
      - "3000:3000"   # the UI: http://localhost:3000
    depends_on:
      chat:
        condition: service_healthy
    healthcheck:
      # node (with global fetch) ships in the runtime image.
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
