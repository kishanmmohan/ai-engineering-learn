# Local dev backing services for ai-engineering-learn.
#
# Config is read from `.env.tool` (declared via `env_file:` on each service below),
# so no --env-file flag is needed:
#   cp .env.tool.example .env.tool
#   docker compose -f docker-compose-tool.yml up -d
#   docker compose -f docker-compose-tool.yml down   # add -v to drop volumes
#
# `.env.tool` must exist before `up` — the services declare it as their env source.
# To remap a host port, edit the "ports:" line for that service directly.

services:
  postgres:
    image: postgres:16
    container_name: aie-postgres
    env_file:
      - .env.tool
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes to a literal $ so the container shell expands POSTGRES_USER at runtime.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: aie-temporal
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      # Supplies POSTGRES_USER and POSTGRES_PWD (auto-setup's names for the DB creds).
      # POSTGRES_USER must differ from "temporal" or auto-setup skips creating the
      # temporal / temporal_visibility databases. See .env.tool.example.
      - .env.tool
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.32.0
    container_name: aie-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  neo4j:
    image: neo4j:5
    container_name: aie-neo4j
    env_file:
      # Supplies NEO4J_AUTH (format: user/password, password >= 8 chars).
      - .env.tool
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: aie-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
  qdrantdata:
